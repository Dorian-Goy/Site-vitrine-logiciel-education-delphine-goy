<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | EduSoft</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: #f8f9fa;
            color: #3c4043;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
        }

        .login-card {
            width: 100%;
            max-width: 980px;
            background: #ffffff;
            border: 1px solid #dadce0;
            border-radius: 12px;
            padding: 34px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin: 0 0 18px;
            font-size: 38px;
            color: #1a73e8;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            font-size: 16px;
            font-weight: 500;
        }

        input {
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 18px;
            font-family: inherit;
        }

        .btn {
            margin-top: 8px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-secondary {
            margin-top: 6px;
            background: #f1f3f4;
            color: #3c4043;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        .forgot-link {
            margin-top: 2px;
            font-size: 14px;
            color: #5f6368;
            text-decoration: none;
            align-self: center;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-top: 14px;
            color: #1a73e8;
            text-decoration: none;
            font-size: 15px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .login-card {
                max-width: 520px;
                padding: 24px;
            }

            h1 {
                font-size: 28px;
            }

            input,
            .btn,
            .btn-secondary {
                font-size: 15px;
                padding: 11px 14px;
            }
        }
    </style>
</head>
<body>
    <main class="login-card">
        <h1>Connexion</h1>
        <form class="login-form" action="#" method="post">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" placeholder="Votre username" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Votre password" required>

            <button type="submit" class="btn">Se connecter</button>
            <button type="button" class="btn-secondary">Créer un compte</button>
            <a href="../mot-de-passe-oublie/" class="forgot-link">mot de passe oublié</a>
        </form>

        <a class="back-link" href="../">← Retour à l'accueil</a>
    </main>
</body>
</html>
