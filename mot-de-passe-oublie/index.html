<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié | EduSoft</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: #f8f9fa;
            color: #3c4043;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
        }

        .card {
            width: 100%;
            max-width: 980px;
            background: #ffffff;
            border: 1px solid #dadce0;
            border-radius: 12px;
            padding: 34px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin: 0 0 18px;
            font-size: 38px;
            color: #1a73e8;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            font-size: 16px;
            font-weight: 500;
        }

        input {
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 18px;
            font-family: inherit;
        }

        .btn {
            margin-top: 8px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        .back-link {
            display: inline-block;
            margin-top: 14px;
            color: #1a73e8;
            text-decoration: none;
            font-size: 15px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .card {
                max-width: 520px;
                padding: 24px;
            }

            h1 {
                font-size: 28px;
            }

            label {
                font-size: 14px;
            }

            input,
            .btn {
                font-size: 15px;
                padding: 11px 14px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Mot de passe oublié</h1>

        <form class="form" action="#" method="post">
            <label for="email">Votre email</label>
            <input id="email" name="email" type="email" placeholder="nom@exemple.com" required>

            <button type="submit" class="btn">demander un code</button>
        </form>

        <a class="back-link" href="../connexion/">← Retour à la connexion</a>
    </main>
</body>
</html>
